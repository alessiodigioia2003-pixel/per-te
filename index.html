<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Memory Lane</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root { --bg: #0C0B0A; --text: #F0EDE8; --gold: #C9A96E; --border: rgba(255,255,255,0.1); }
body, html { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }
.hidden { display: none !important; }

/* AVVISO VOLUME - Ora è esterno per restare sempre visibile */
.volume-notice {
  position: fixed; top: 20px; right: 20px;
  font-size: 0.7rem; letter-spacing: 0.1em; color: var(--gold);
  text-transform: uppercase; border: 1px solid var(--gold);
  padding: 4px 8px; border-radius: 4px; opacity: 0.8; z-index: 200;
}

/* LOCK SCREEN */
#lock { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; box-sizing: border-box; }
.l-question { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 2rem; line-height: 1.5; font-style: italic; }
.l-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 1rem; color: var(--text); border-radius: 8px; width: 100%; max-width: 280px; text-align: center; outline: none; font-size: 16px; }
.btn-submit { margin-top: 1.5rem; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 0.8rem 2.5rem; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; }

/* INDIZIO (Appare dopo 3 errori) */
#hint-text { margin-top: 1.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.4); font-style: italic; opacity: 0; transition: opacity 0.5s; max-width: 80%; }

/* OVERLAY SBLOCCO */
#unlock-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.6s; }
#unlock-overlay.show { opacity: 1; }
.u-text { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; }

/* SLIDESHOW */
#slideshow { height: 100vh; width: 100vw; background: #000; position: relative; }
.ss-media-wrap { height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
.ss-media { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.3s; }
.ss-nav { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 3rem; pointer-events: none; z-index: 150; }
.btn-arr { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: var(--text); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
</style>
</head>
<body>

<div class="volume-notice">Volume ON 🔊</div>
<audio id="bg-music" preload="auto">
  <source src="canzone.mp3" type="audio/mpeg">
</audio>

<div id="lock">
  <p class="l-question">You know I tend to do it, because I'm attached to them. What are they?</p>
  <input class="l-input" id="ans-input" type="text" placeholder="your answer..." autocomplete="off">
  <button class="btn-submit" onclick="check()">Enter</button>
  <p id="hint-text">There’s no help, clever girl — you can do it on your own</p>
</div>

<div id="unlock-overlay">
  <p class="u-text">you got it</p>
</div>

<div id="slideshow" class="hidden">
  <div class="ss-media-wrap" id="ss-wrap"></div>
  <div class="ss-nav">
    <button class="btn-arr" onclick="prev()">←</button>
    <button class="btn-arr" onclick="next()">→</button>
  </div>
</div>

<script>
const files = [
  "IMG_0159.jpg", "IMG_0160.jpg", "IMG_0161.jpg", "IMG_0162.jpg", "IMG_0163.jpg",
  "IMG_0164.jpg", "IMG_0165.jpg", "IMG_0166.jpg", "IMG_0172.jpg", "IMG_0173.jpg",
  "IMG_0180.jpg", "IMG_0182.jpg", "IMG_0183.jpg", "IMG_0184.jpg", "IMG_0185.jpg",
  "IMG_0186.jpg", "IMG_0187.jpg", "IMG_0188.jpg", "IMG_0189.jpg", "IMG_0190.jpg",
  "IMG_0191.jpg", "IMG_0192.jpg", "IMG_0193.jpg", "IMG_0195.jpg", "IMG_0196.jpg",
  "IMG_0200.jpg", "IMG_0201.jpg", "IMG_0203.jpg", "IMG_0204.jpg", "IMG_0211.jpg",
  "IMG_0212.jpg", "IMG_0213.jpg", "IMG_0214.jpg", "IMG_0217.jpg", "IMG_0218.jpg",
  "IMG_0224.jpg", "IMG_0225.jpg", "IMG_0226.jpg", "IMG_0227.jpg", "IMG_0228.jpg",
  "IMG_0229.jpg", "IMG_0230.jpg", "IMG_0232.jpg", "IMG_0239.jpg", "IMG_0240.jpg",
  "IMG_0241.jpg", "IMG_0242.jpg", "IMG_0244.jpg", "IMG_0245.jpg", "IMG_0246.jpg",
  "IMG_0248.jpg", "IMG_0249.jpg", "IMG_0250.jpg", "IMG_0251.jpg", "IMG_0252.jpg",
  "IMG_0253.jpg", "IMG_0256.jpg", "IMG_0257.jpg", "IMG_0258.jpg", "IMG_0259.jpg",
  "IMG_0260.jpg", "IMG_0261.jpg", "IMG_0263.jpg", "IMG_0264.jpg", "IMG_0265.jpg",
  "IMG_0266.jpg", "IMG_0267.jpg", "IMG_0268.jpg", "IMG_0269.jpg", "IMG_0270.jpg",
  "IMG_0271.jpg", "IMG_0272.jpg", "IMG_0276.jpg", "IMG_0277.jpg", "IMG_0278.jpg",
  "IMG_0279.jpeg", "IMG_0280.jpeg", "IMG_0281.jpeg", "IMG_0282.jpeg", 
  "4324F29F-825D-4CCB-8623-BF25D4805863.mp4",
  "3C82549F-9397-4F41-924E-2C9B65CF8FEC (1).MP4",
  "IMG_0283.jpeg", "IMG_0285.jpeg", "IMG_2084.jpeg"
];

let idx = 0;
let attempts = 0;
const pass = 'memories';

// Funzione pre-caricamento per evitare il nero
function preloadNext() {
  if (idx < files.length - 1) {
    const nextFile = files[idx + 1];
    if (!nextFile.toLowerCase().endsWith('.mp4')) {
      const img = new Image();
      img.src = nextFile;
    }
  }
}

document.getElementById('ans-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') check();
});

function check() {
  const inputVal = document.getElementById('ans-input').value.toLowerCase().trim();
  if(inputVal === pass) {
    const music = document.getElementById('bg-music');
    music.play();
    const ov = document.getElementById('unlock-overlay');
    ov.classList.add('show');
    setTimeout(() => {
      ov.classList.remove('show');
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('slideshow').classList.remove('hidden');
      render();
    }, 2000);
  } else {
    attempts++;
    const input = document.getElementById('ans-input');
    input.style.borderColor = 'red';
    if (attempts >= 3) { document.getElementById('hint-text').style.opacity = "1"; }
    setTimeout(() => input.style.borderColor = 'rgba(255,255,255,0.1)', 500);
  }
}

function render() {
  const wrap = document.getElementById('ss-wrap');
  const file = files[idx];
  const isVid = file.toLowerCase().endsWith('.mp4');
  
  const el = document.createElement(isVid ? 'video' : 'img');
  el.src = file;
  el.className = 'ss-media';
  if(isVid) { el.controls = true; el.autoplay = true; el.playsInline = true; }
  
  // Quando la nuova immagine/video è pronta, la mostriamo
  el.onload = () => { wrap.innerHTML = ''; wrap.appendChild(el); preloadNext(); };
  if(isVid) { // Per i video usiamo un evento diverso
    el.onloadeddata = () => { wrap.innerHTML = ''; wrap.appendChild(el); preloadNext(); };
  }
  
  // Se l'immagine è già in cache o carica istantaneamente
  if(!isVid && el.complete) { wrap.innerHTML = ''; wrap.appendChild(el); preloadNext(); }
}

function next() { if(idx < files.length - 1) { idx++; render(); } }
function prev() { if(idx > 0) { idx--; render(); } }

let ts = 0;
document.addEventListener('touchstart', e => ts = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
  const te = e.changedTouches[0].screenX;
  if (te < ts - 50) next();
  if (te > ts + 50) prev();
});
</script>
</body>
</html>
