<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Memory Lane</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0B0A;
  --text: #F0EDE8;
  --gold: #C9A96E;
  --border: rgba(255,255,255,0.1);
}
body, html { 
  background: var(--bg); color: var(--text); 
  font-family: 'Jost', sans-serif; 
  margin: 0; padding: 0; overflow: hidden; height: 100vh;
}
.hidden { display: none !important; }

/* LOCK SCREEN */
#lock {
  height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 2rem;
}
.l-question {
  font-family: 'Playfair Display', serif; font-size: 1.3rem;
  margin-bottom: 2rem; line-height: 1.5; font-style: italic;
}
.l-input {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  padding: 1rem; color: var(--text); border-radius: 8px;
  width: 100%; max-width: 280px; text-align: center; outline: none;
}

/* UNLOCK OVERLAY (No cuore) */
#unlock-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.6s;
}
#unlock-overlay.show { opacity: 1; }
.u-text { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; }

/* SLIDESHOW */
#slideshow { height: 100vh; width: 100vw; background: #000; position: relative; }
.ss-media-wrap { height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; }
.ss-media { width: 100%; height: 100%; object-fit: contain; }
.ss-nav {
  position: absolute; bottom: 40px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 3rem; pointer-events: none;
}
.btn-arr {
  background: rgba(255,255,255,0.1); border: 1px solid var(--border);
  color: var(--text); width: 60px; height: 60px; border-radius: 50%; 
  cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center;
}
.error-msg { color: #C4847A; font-size: 0.8rem; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="lock">
  <p class="l-question">You know I tend to do it, because I'm attached to them. What are they?</p>
  <input class="l-input" id="ans-input" type="text" placeholder="your answer..." onkeydown="if(event.key==='Enter') check()">
  <button style="margin-top:1.5rem;" onclick="check()" class="l-input">Enter</button>
</div>

<div id="unlock-overlay">
  <p class="u-text">you got it</p>
</div>

<div id="slideshow" class="hidden">
  <div class="ss-media-wrap" id="ss-wrap"></div>
  <div class="ss-nav">
    <button class="btn-arr" onclick="prev()">←</button>
    <button class="btn-arr" onclick="next()">→</button>
  </div>
</div>

<script>
const files = [
  "IMG_0159.jpg", "IMG_0160.jpg", "IMG_0161.jpg", "IMG_0162.jpg", "IMG_0163.jpg",
  "IMG_0164.jpg", "IMG_0165.jpg", "IMG_0166.jpg", "IMG_0172.jpg", "IMG_0173.jpg",
  "IMG_0180.jpg", "IMG_0182.jpg", "IMG_0183.jpg", "IMG_0184.jpg", "IMG_0185.jpg",
  "IMG_0186.jpg", "IMG_0187.jpg", "IMG_0188.jpg", "IMG_0189.jpg", "IMG_0190.jpg",
  "IMG_0191.jpg", "IMG_0192.jpg", "IMG_0193.jpg", "IMG_0195.jpg", "IMG_0196.jpg",
  "IMG_0200.jpg", "IMG_0201.jpg", "IMG_0203.jpg", "IMG_0204.jpg", "IMG_0211.jpg",
  "IMG_0212.jpg", "IMG_0213.jpg", "IMG_0214.jpg", "IMG_0217.jpg", "IMG_0218.jpg",
  "IMG_0224.jpg", "IMG_0225.jpg", "IMG_0226.jpg", "IMG_0227.jpg", "IMG_0228.jpg",
  "IMG_0229.jpg", "IMG_0230.jpg", "IMG_0232.jpg", "IMG_0239.jpg", "IMG_0240.jpg",
  "IMG_0241.jpg", "IMG_0242.jpg", "IMG_0244.jpg", "IMG_0245.jpg", "IMG_0246.jpg",
  "IMG_0248.jpg", "IMG_0249.jpg", "IMG_0250.jpg", "IMG_0251.jpg", "IMG_0252.jpg",
  "IMG_0253.jpg", "IMG_0256.jpg", "IMG_0257.jpg", "IMG_0258.jpg", "IMG_0259.jpg",
  "IMG_0260.jpg", "IMG_0261.jpg", "IMG_0263.jpg", "IMG_0264.jpg", "IMG_0265.jpg",
  "IMG_0266.jpg", "IMG_0267.jpg", "IMG_0268.jpg", "IMG_0269.jpg", "IMG_0270.jpg",
  "IMG_0271.jpg", "IMG_0272.jpg", "IMG_0276.jpg", "IMG_0277.jpg", "IMG_0278.jpg",
  "IMG_0279.jpeg", "IMG_0280.jpeg", "IMG_0281.jpeg", "IMG_0282.jpeg", "IMG_0283.jpeg",
  "IMG_0285.jpeg", "IMG_2084.jpeg",
  "3C82549F-9397-4F41-924E-2C9B65CF8FEC (1).MP4",
  "4324F29F-825D-4CCB-8623-BF25D4805863.mp4"
];

let idx = 0;
const pass = 'memories';

function check() {
  if(document.getElementById('ans-input').value.toLowerCase() === pass) {
    const ov = document.getElementById('unlock-overlay');
    ov.classList.add('show');
    setTimeout(() => {
      ov.classList.remove('show');
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('slideshow').classList.remove('hidden');
      render();
    }, 2000);
  }
}

function render() {
  const wrap = document.getElementById('ss-wrap');
  wrap.innerHTML = '';
  const file = files[idx];
  const isVid = file.toLowerCase().endsWith('.mp4');
  const el = document.createElement(isVid ? 'video' : 'img');
  el.src = file;
  el.className = 'ss-media';
  if(isVid) { el.controls = true; el.autoplay = true; el.playsInline = true; }
  el.onerror = () => {
    wrap.innerHTML = `<div class="error-msg">Errore: "${file}" non trovato.<br>Controlla se su GitHub è scritto .JPG invece di .jpg</div>`;
  };
  wrap.appendChild(el);
}

function next() { if(idx < files.length - 1) { idx++; render(); } }
function prev() { if(idx > 0) { idx--; render(); } }

let ts = 0;
document.addEventListener('touchstart', e => ts = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
  const te = e.changedTouches[0].screenX;
  if (te < ts - 50) next();
  if (te > ts + 50) prev();
});
</script>
</body>
</html>
